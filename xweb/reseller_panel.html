<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reseller Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="reseller_panel.css">
</head>
<body>

<div class="box">

  <div class="topbar">
    <h2>Reseller Panel</h2>
    <button class="danger" style="width:120px" onclick="logout()">Logout</button>
  </div>

  <!-- User controls -->
  <input id="u" placeholder="Username">
  <input id="k" placeholder="Access Key">
  <input id="e" type="date">
  <input id="d" placeholder="Device limit (number/unlimited)">

  <button onclick="addUser()">Add User</button>
  <button class="primary" onclick="loadUsers()">Refresh Users</button>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Key</th>
        <th>Expiry</th>
        <th>Limit</th>
        <th>Used</th>
        <th>Devices</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbl"></tbody>
  </table>

</div>

<script src="reseller_panel.js"></script>

</body>
</html>
