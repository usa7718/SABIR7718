<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S7 — Digital Identity</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');

    :root {
      --neon: #00fff7;
      --violet: #b500ff;
      --glass: rgba(20, 20, 30, 0.4);
      --border: rgba(0, 255, 247, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      background-color: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
      perspective: 1000px;
    }

    /* --- Welcome Boot Screen --- */
    #loader {
      position: fixed;
      inset: 0;
      background: #050505;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    .terminal-loader {
      font-size: 1.2em;
      color: var(--neon);
      text-shadow: 0 0 10px var(--neon);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .terminal-text::after {
      content: '█';
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* --- Animated Cyber Grid Background --- */
    .cyber-grid {
      position: absolute;
      bottom: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image: 
        linear-gradient(rgba(0, 255, 247, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 247, 0.2) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: rotateX(75deg);
      transform-origin: center;
      animation: moveGrid 10s linear infinite;
      z-index: -2;
      pointer-events: none;
    }

    .grid-fade {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 10%, #050505 70%);
      z-index: -1;
      pointer-events: none;
    }

    @keyframes moveGrid {
      0% { transform: rotateX(75deg) translateY(0); }
      100% { transform: rotateX(75deg) translateY(40px); }
    }

    /* Ambient background glowing orbs */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: orbFloat 10s ease-in-out infinite alternate;
    }

    body::before {
      background: var(--neon);
      top: 10%;
      left: 20%;
      opacity: 0.15;
    }

    body::after {
      background: var(--violet);
      bottom: 10%;
      right: 20%;
      opacity: 0.15;
      animation-delay: -5s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.5); }
    }

    /* --- Main Card --- */
    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      border-radius: 24px;
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(0, 255, 247, 0.05);
      position: relative;
      transform-style: preserve-3d;
      opacity: 0;
      transform: translateY(50px) scale(0.9);
      transition: transform 0.1s; /* For JS tilt */
    }

    .container.loaded {
      animation: enterCard 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      animation-delay: 0.2s;
    }

    @keyframes enterCard {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glowing animated border pseudo-element */
    .container::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      background: linear-gradient(45deg, var(--neon), transparent, var(--violet), transparent);
      z-index: -1;
      background-size: 200% 200%;
      animation: borderGlow 6s linear infinite;
      opacity: 0.5;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* --- Avatar --- */
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 30%; /* Squircle shape */
      margin: 0 auto 20px;
      background-image: url("https://a.top4top.io/p_3448nqb7o0.jpeg");
      background-size: cover;
      background-position: center;
      border: 2px solid var(--neon);
      box-shadow: 
        0 0 20px rgba(0,255,247,0.4),
        inset 0 0 20px rgba(0,255,247,0.4);
      animation: breathe 3s ease-in-out infinite;
      transform: translateZ(30px); /* 3D pop out */
      transition: all 0.4s ease;
    }

    .container:hover .avatar {
      border-radius: 50%;
      box-shadow: 0 0 40px var(--neon);
    }

    @keyframes breathe {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(0,255,247,0.5)); }
      50% { filter: drop-shadow(0 0 25px rgba(0,255,247,0.9)); }
    }

    /* --- Typography --- */
    h1 {
      text-align: center;
      margin: 0;
      font-size: 1.8em;
      letter-spacing: 2px;
      text-transform: uppercase;
      transform: translateZ(20px);
    }

    h1 span {
      background: linear-gradient(to right, var(--neon), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
    }

    /* Glitch effect on hover */
    h1:hover {
      animation: glitch 0.2s linear infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 var(--neon), -2px 0 var(--violet); }
      50% { text-shadow: -2px 0 var(--neon), 2px 0 var(--violet); }
      100% { text-shadow: 2px 0 var(--neon), -2px 0 var(--violet); }
    }

    .tagline {
      text-align: center;
      font-size: 0.9em;
      color: #00fff7;
      margin: 10px 0 28px;
      text-shadow: 0 0 8px rgba(0,255,247,0.5);
      transform: translateZ(15px);
      display: inline-block;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid var(--neon);
      animation: typing 2.5s steps(30, end) forwards, blink 0.75s step-end infinite;
    }

    @keyframes typing {
      from { max-width: 0; }
      to { max-width: 100%; border-color: transparent; }
    }

    .about {
      font-size: 0.9em;
      line-height: 1.6;
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 12px;
      border-left: 3px solid var(--neon);
      margin-bottom: 28px;
      transform: translateZ(10px);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .about b {
      color: var(--neon);
    }

    /* --- Social Icons --- */
    .socials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      transform: translateZ(25px);
    }

    .socials a {
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6em;
      color: #fff;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .socials a::before {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--neon);
      transition: all 0.3s ease;
      z-index: -1;
    }

    .socials a:hover::before {
      top: 0;
    }

    .socials a:hover {
      color: #000;
      transform: translateY(-8px) scale(1.1);
      box-shadow: 0 10px 20px rgba(0,255,247,0.5);
      border-color: var(--neon);
    }

    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.75em;
      color: rgba(255,255,255,0.4);
      transform: translateZ(5px);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { max-width: 90%; padding: 30px 20px; }
      .avatar { width: 100px; height: 100px; }
      h1 { font-size: 1.5em; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="terminal-loader">
      <span class="terminal-text" id="typewriter"></span>
    </div>
  </div>

  <div class="cyber-grid"></div>
  <div class="grid-fade"></div>

  <div class="container" id="card">
    <div class="avatar"></div>

    <h1>S7 <span>// Dev</span></h1>
    <div class="tagline">UI · UX · Security · Automation</div>

    <div class="about">
      I design sleek interfaces, build secure applications, and automate workflows using <b>Python</b>.<br><br>
      Currently focused on bug bounty research — <b>XSS, SQLi</b>, and modern web exploitation.
    </div>

    <div class="socials">
      <a href="https://github.com/SABIR7718" target="_blank"><i class="bi bi-github"></i></a>
      <a href="https://t.me/SABIR7718" target="_blank"><i class="bi bi-telegram"></i></a>
      <a href="https://discord.com/users/SABIR7718" target="_blank"><i class="bi bi-discord"></i></a>
      <a href="https://www.youtube.com/@SABIR7718" target="_blank"><i class="bi bi-youtube"></i></a>
    </div>

    <footer>© 2025 SABIR7718 · Smooth as Butter</footer>
  </div>

  <script>
    // --- 1. Welcome Boot Screen Sequence ---
    const textElement = document.getElementById('typewriter');
    const texts = ["> INITIALIZING S7 PROTOCOLS...", "> DECRYPTING DATA...", "> ACCESS GRANTED."];
    let textIndex = 0;
    let charIndex = 0;

    function typeWriter() {
      if (textIndex < texts.length) {
        if (charIndex < texts[textIndex].length) {
          textElement.innerHTML += texts[textIndex].charAt(charIndex);
          charIndex++;
          setTimeout(typeWriter, 50); // Typing speed
        } else {
          setTimeout(() => {
            textElement.innerHTML = '';
            charIndex = 0;
            textIndex++;
            typeWriter();
          }, 600); // Pause between lines
        }
      } else {
        // Remove loader and show card
        setTimeout(() => {
          document.getElementById('loader').style.opacity = '0';
          document.getElementById('loader').style.visibility = 'hidden';
          document.getElementById('card').classList.add('loaded');
        }, 300);
      }
    }
    
    // Start typing on load
    window.onload = () => {
      setTimeout(typeWriter, 500);
    };

    // --- 2. Interactive 3D Card Tilt (Vanilla JS) ---
    const card = document.getElementById('card');
    
    document.addEventListener('mousemove', (e) => {
      // Only apply tilt if the card is loaded
      if(!card.classList.contains('loaded')) return;

      let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Reset tilt when mouse leaves
    document.addEventListener('mouseleave', () => {
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
      card.style.transition = 'transform 0.5s ease';
      setTimeout(() => { card.style.transition = 'transform 0.1s'; }, 500);
    });
  </script>

</body>
</html>
