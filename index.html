<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S7 — Digital Identity</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');

    :root {
      --neon: #00fff7;
      --violet: #7c7cff;
      --glass: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(circle at top, #0a0f2c, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    /* Animated background glow */
    body::before {
      content: "";
      position: fixed;
      inset: -50%;
      background:
        radial-gradient(circle at 20% 30%, rgba(0,255,247,0.12), transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(124,124,255,0.12), transparent 35%);
      animation: bgFloat 18s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgFloat {
      from { transform: translateY(-40px); }
      to   { transform: translateY(40px); }
    }

    /* Main card */
    .container {
      width: 100%;
      max-width: 420px;
      padding: 36px 28px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow:
        0 0 60px rgba(0,255,247,0.18),
        inset 0 0 30px rgba(255,255,255,0.04);
      position: relative;

      animation:
        enter 1s cubic-bezier(.22,1,.36,1),
        floatCard 6s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floatCard {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 18px;
      margin: 0 auto 20px;
      background-image: url("https://a.top4top.io/p_3448nqb7o0.jpeg");
      background-size: cover;
      background-position: center;
      border: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(0,255,247,0.6);
      animation: breathe 4.5s ease-in-out infinite;
      transition: transform 0.5s cubic-bezier(.22,1,.36,1);
    }

    .avatar:hover {
      transform: scale(1.08) rotate(1deg);
    }

    @keyframes breathe {
      0%,100% { box-shadow: 0 0 28px rgba(0,255,247,0.45); }
      50%     { box-shadow: 0 0 45px rgba(0,255,247,0.8); }
    }

    h1 {
      text-align: center;
      margin: 0;
      font-size: 1.7em;
      letter-spacing: 1px;
    }

    h1 span {
      color: var(--neon);
    }

    .tagline {
      text-align: center;
      font-size: 0.85em;
      color: #aaa;
      margin: 10px 0 28px;
      animation: fadeUp 1.2s ease both;
    }

    .about {
      font-size: 0.9em;
      line-height: 1.7;
      background: var(--glass);
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 28px;
      animation: fadeUp 1.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Social icons */
    .socials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .socials a {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      color: #ccc;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      border: 1px solid var(--border);
      transition: 
        transform 0.35s cubic-bezier(.22,1,.36,1),
        box-shadow 0.35s ease,
        color 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .socials a::before {
      content: "";
      position: absolute;
      inset: -100%;
      background: linear-gradient(120deg, transparent, rgba(0,255,247,0.35), transparent);
      transition: 0.6s ease;
    }

    .socials a:hover::before {
      inset: 100%;
    }

    .socials a:hover {
      color: var(--neon);
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 0 22px rgba(0,255,247,0.7);
    }

    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.75em;
      color: #888;
      animation: fadeUp 1.6s ease both;
    }
  </style>
</head>
