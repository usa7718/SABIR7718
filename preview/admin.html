<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ---------- GLOBAL ---------- */
:root{
  --bg:#0d1117; --box:#161b22; --border:#30363d;
  --text:#fff; --accent:#238636; --accent-hover:#2ea043;
  --danger:#da3633; --danger-hover:#f85149;
  --primary:#0969da; --primary-hover:#1f6feb;
  --muted:#8b949e;
}
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex; flex-direction:column; gap:25px;
  padding:15px;
}
.box{
  max-width:1000px;
  margin:auto;
  background:var(--box);
  padding:25px;
  border-radius:12px;
  border:1px solid var(--border);
}
h1,h2,h3{margin:0 0 15px}

/* ---------- INPUTS ---------- */
input,button,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:6px;
  background:#21262d;
  color:var(--text);
}
input:focus{outline:2px solid var(--primary);}

/* ---------- BUTTONS ---------- */
.btn{
  cursor:pointer;
  transition:0.15s;
  font-weight:600;
}
.btn:hover{transform:translateY(-1px);}
.btn.primary{background:var(--primary);}
.btn.primary:hover{background:var(--primary-hover);}
.btn.success{background:var(--accent);}
.btn.success:hover{background:var(--accent-hover);}
.btn.danger{background:var(--danger);}
.btn.danger:hover{background:var(--danger-hover);}
.btn.small{padding:6px 10px; font-size:13px; width:auto; margin:2px}

/* ---------- TABLES ---------- */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:14px;
}
th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
th{background:#1c2229;}
tr:hover td{background:#21262d;}

/* ---------- TABS ---------- */
.nav{
  display:flex;
  gap:10px;
  justify-content:center;
}
.nav button{
  flex:1;
  max-width:200px;
}

/* ---------- MODAL CONFIRM ---------- */
#confirmBox{
  position:fixed; inset:0;
  display:none;
  background:#000a;
  align-items:center; justify-content:center;
}
#confirmBox .inner{
  background:var(--box);
  padding:25px;
  border-radius:10px;
  width:300px;
  text-align:center;
}
</style>
</head>
<body>


<div class="box" id="loginBox">
  <h2>🔐 Admin Login</h2>
  <input id="adminUser" placeholder="Admin Username">
  <input id="adminKey" type="password" placeholder="Admin Key">
  <button class="btn primary" onclick="adminLogin()">Login</button>
</div>

<div class="box" id="panelBox" style="display:none;">
  <h2>⚙️ Admin Dashboard</h2>

  <div class="nav">
    <button class="btn primary" onclick="showUsers()">Users</button>
    <button class="btn primary" onclick="showResellers()">Resellers</button>
  </div>

  <!-- USERS -->
  <div id="usersPanel">
    <h3>Add User</h3>
    <input id="newUser" placeholder="Username">
    <input id="newKey" placeholder="Access Key">
    <input id="newExpiry" type="date">
    <input id="newDeviceLimit" placeholder="Device limit (number/unlimited)">
    <select id="newPlatform">
  <option value="both">Both (Web + APK)</option>
  <option value="web">Web Only</option>
  <option value="apk">APK Only</option>
</select>

    <button class="btn success" onclick="addUser()">Add User</button>
    <button class="btn primary" onclick="loadUsers()">Refresh</button>

    <table>
      <thead>
        <tr><th>User</th><th>Key</th><th>Expiry</th><th>Limit</th><th>Platform</th><th>Created By</th><th>Devices</th><th>Actions</th></tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>

    <br>
    <button class="btn danger" onclick="restartServer()">Restart Server</button>
    <button class="btn danger" onclick="clearAllUsers()">Clear All Users ❗</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <!-- RESELLERS -->
  <div id="resellerPanel" style="display:none;">
    <h3>Add Reseller</h3>
    <input id="rUser" placeholder="Reseller Username">
<input id="rKey" placeholder="Reseller Key">
<input id="rExp" type="date">
<select id="rPlatform">
  <option value="both">Both (Web + APK)</option>
  <option value="web">Web Only</option>
  <option value="apk">APK Only</option>
</select>

<button class="btn success" onclick="addReseller()">Add Reseller</button>
<button class="btn primary" onclick="loadResellers()">Refresh</button>

<table>
  <thead>
    <tr><th>User</th><th>Key</th><th>Expiry</th><th>Actions</th></tr>
  </thead>
  <tbody id="rsTable"></tbody>
</table>
  </div>
</div>

<!-- Confirm Box -->
<div id="confirmBox">
  <div class="inner">
    <p id="confirmMsg"></p>
    <button class="btn success" onclick="confirmAction(true)">OK</button>
    <button class="btn danger" onclick="confirmAction(false)">Cancel</button>
  </div>
</div>

<script>

async function getDeviceCode() {
  const saved = localStorage.getItem("deviceCode");
  if (saved && saved.length === 64) return saved;

  const safe = v =>
    v !== undefined && v !== null && v !== "" ? v : "0";

  const parts = [
    safe(navigator.userAgent),
    safe(navigator.language),
    safe(screen.width),
    safe(screen.height),
    safe(screen.colorDepth),
    safe(navigator.hardwareConcurrency),
    safe(navigator.deviceMemory),
    safe(Intl.DateTimeFormat().resolvedOptions().timeZone),
    safe(new Date().getTimezoneOffset())
  ].join("|");

  const encoded = new TextEncoder().encode(parts);
  const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);

  const dc = [...new Uint8Array(hashBuffer)]
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");

  localStorage.setItem("deviceCode", dc);
  return dc;
}

/* ---------- CONFIG ---------- */
const API = "https://proxyweb-pgev.onrender.com";
//const API = "https://473ad2cd0a8b.ngrok-free.app";

/* ---------- UI SWITCH ---------- */
function showUsers() {
  usersPanel.style.display = "block";
  resellerPanel.style.display = "none";
}
function showResellers() {
  usersPanel.style.display = "none";
  resellerPanel.style.display = "block";
}

/* ---------- SIMPLE CONFIRM DIALOG ---------- */
let confirmResolve;
function ask(msg) {
  confirmMsg.textContent = msg;
  confirmBox.style.display = "flex";
  return new Promise(r => confirmResolve = r);
}
function confirmAction(v) {
  confirmBox.style.display = "none";
  confirmResolve(v);
}

/* ---------- LOGIN ---------- */
async function adminLogin() {
  const username = adminUser.value.trim();
  const accessKey = adminKey.value.trim();
  const deviceCode = await getDeviceCode();

  const res = await fetch(`${API}/admin/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, accessKey, deviceCode })
  });

  if (res.ok) {
    loginBox.style.display = "none";
    panelBox.style.display = "block";
    loadUsers();
  } else {
    alert("Invalid login");
  }
}

/* ---------- LOAD USERS ---------- */
async function loadUsers() {
  const username = adminUser.value.trim();
  const accessKey = adminKey.value.trim();
  const deviceCode = await getDeviceCode();

  const res = await fetch(`${API}/admin/users`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username,
      accessKey,
      deviceCode
    })
  });

  if (!res.ok) {
    alert("Unauthorized / session expired");
    return;
  }

  const data = await res.json();
  userTable.innerHTML = "";

  data.forEach(u => {
  const createdBy = u.createdBy ? u.createdBy : "admin";
  const usedCount = (u.devicesUsed || []).length;
const limit = u.devicesAllowed === "unlimited"
  ? "∞"
  : u.devicesAllowed;
    const expiry = new Date(u.expiry).toLocaleDateString();

    const usedList = (u.devicesUsed || []).length
      ? (u.devicesUsed || [])
          .map(d => `<span title="${d}">${d.slice(0, 8)}...${d.slice(-8)}</span>`)
          .join("<br>")
      : "—";

    userTable.innerHTML += `
      <tr>
        <td>${u.username}</td>
        <td>${u.accessKey}</td>
        <td>${expiry}</td>
        <td>${limit}/${usedCount}</td>
        <td>${u.platform || "both"}</td>
        <td>${createdBy}</td>
        <td style="font-size:12px">${usedList}</td>
        <td>
          <button class="btn small primary"
  onclick="editUser('${u.username}','${u.accessKey}')">Edit</button>
          <button onclick="deleteUser('${u.username}','${u.accessKey}')">Delete</button>
          <button class="btn small" onclick="clearUser('${u.username}')">Clear</button>
        </td>
      </tr>`;
  });
}

/* ---------- ADD USER ---------- */
async function addUser() {
  const u = newUser.value.trim();
  const k = newKey.value.trim();
  const expiryDate = newExpiry.value.trim();
  const devicesAllowed = newDeviceLimit.value.trim();

  if (!u || !k || !expiryDate || !devicesAllowed)
    return alert("⚠ Fill all fields");

  const expiry = new Date(`${expiryDate}T23:59:59Z`).toISOString();
  const deviceCode = await getDeviceCode();
  const platform = document.getElementById("newPlatform").value;

  await fetch(`${API}/admin/add`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value,
      adminKey: adminKey.value,
      deviceCode,
      username: u,
      accessKey: k,
      expiry,
      devicesAllowed,
      platform
    })
  });

  await loadUsers();
  alert(`✔ User "${u}" added`);
}

/* ---------- EDIT USER ---------- */
async function editUser(targetUser, targetKey) {
  const newKey = prompt("New key?");
  const d = prompt("New expiry (YYYY-MM-DD)?");
  const newDeviceLimit = prompt("New device limit?");
  const expiry = d ? new Date(`${d}T23:59:59Z`).toISOString() : null;

  const deviceCode = await getDeviceCode();

  await fetch(`${API}/admin/edit`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
  adminUser: adminUser.value,
  adminKey: adminKey.value,
  deviceCode,
  targetUser,
  targetKey,
  newKey,
  newExpiry: expiry,
  newDeviceLimit
})
  });

  loadUsers();
}

/* ---------- DELETE USER ---------- */
async function deleteUser(username, accessKey) {
  if (!(await ask(`Delete ${username}?`))) return;

  await fetch(`${API}/admin/delete`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value,
      adminKey: adminKey.value,
      deviceCode: await getDeviceCode(),
      username,
      accessKey
    })
  });

  loadUsers();
}

/* ---------- CLEAR USER DEVICES ---------- */
async function clearUser(targetUser) {
  if (!(await ask(`Clear devices for ${targetUser}?`))) return;

  await fetch(`${API}/admin/clear`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value,
      adminKey: adminKey.value,
      deviceCode: await getDeviceCode(),
      username: targetUser
    })
  });

  loadUsers();
}

/* ---------- CLEAR ALL USERS ---------- */
async function clearAllUsers() {
  if (!(await ask("⚠ CLEAR ALL USERS?"))) return;

  await fetch(`${API}/admin/clearall`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value,
      adminKey: adminKey.value,
      deviceCode: await getDeviceCode()
    })
  });

  loadUsers();
}

/* ---------- RESTART SERVER ---------- */
async function restartServer() {
  if (!(await ask("⚠ Restart the server?"))) return;

  await fetch(`${API}/admin/restart`, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    username: adminUser.value,
    accessKey: adminKey.value,
    deviceCode: await getDeviceCode()
  })
});

  alert("Server restarting...");
}

/* ---------- LOGOUT ---------- */
function logout() {
  panelBox.style.display = "none";
  loginBox.style.display = "block";
}

/* ---------- RESELLERS ---------- */
async function loadResellers() {

  const res = await fetch(`${API}/admin/reseller/list`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value.trim(),
      adminKey: adminKey.value.trim(),
      deviceCode: await getDeviceCode()
    })
  });

  if (!res.ok) {
    alert("❌ Unauthorized (admin auth failed)");
    return;
  }

  const list = await res.json();
  rsTable.innerHTML = "";

  list.forEach(r => {
    const exp = new Date(r.expiry).toLocaleDateString();

    rsTable.innerHTML += `
      <tr>
        <td>${r.username}</td>
        <td>${r.accessKey}</td>
        <td>${exp}</td>
        <td>
          <button class="btn small primary"
            onclick="editReseller('${r.username}','${r.accessKey}')">
            Edit
          </button>
          <button class="btn small danger"
            onclick="deleteReseller('${r.username}','${r.accessKey}')">
            Delete
          </button>
        </td>
      </tr>`;
  });
}

async function deleteReseller(username, accessKey) {
  if (!confirm(`Delete reseller ${username}?`)) return;

  await fetch(`${API}/admin/reseller/delete`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value,
      adminKey: adminKey.value,
      deviceCode: await getDeviceCode(),
      username,
      accessKey
    })
  });

  loadResellers();
}

async function editReseller(targetUser, targetKey) {
  const newKey = prompt("New reseller key?");
  const d = prompt("New expiry (YYYY-MM-DD)?");
  const newExpiry = d
    ? new Date(`${d}T23:59:59Z`).toISOString()
    : null;

  const deviceCode = await getDeviceCode();

  await fetch(`${API}/admin/reseller/edit`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value,
      adminKey: adminKey.value,
      deviceCode,
      targetUser,
      targetKey,
      newKey,
      newExpiry
    })
  });

  loadResellers();
}

async function addReseller() {
  const username = rUser.value.trim();
  const accessKey = rKey.value.trim();
  const expiryDate = rExp.value;
  const platform = document.getElementById("rPlatform").value;

  if (!username || !accessKey || !expiryDate) {
    return alert("⚠ Fill all reseller fields");
  }

  const expiry = new Date(`${expiryDate}T23:59:59Z`).toISOString();
  const deviceCode = await getDeviceCode();

  const res = await fetch(`${API}/admin/reseller/add`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      adminUser: adminUser.value.trim(),
      adminKey: adminKey.value.trim(),
      deviceCode,
      username,
      accessKey,
      expiry,
      platform
    })
  });

  const data = await res.json();

  if (!res.ok) {
    return alert(data.message || "❌ Failed to add reseller");
  }

  alert(`✅ Reseller "${username}" added`);
  loadResellers();
}
</script>
</body>
</html>
